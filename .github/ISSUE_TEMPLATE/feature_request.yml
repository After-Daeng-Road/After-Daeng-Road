name: ✨ 기능 제안
description: 새로운 기능이나 개선을 제안합니다.
title: '[FEATURE] '
labels: ['enhancement']
body:
  - type: markdown
    attributes:
      value: |
        아이디어 감사합니다. 아래를 채워주시면 검토가 수월해요.

  - type: textarea
    id: problem
    attributes:
      label: 해결하려는 문제
      description: 어떤 불편 · 문제를 해결하고 싶나요?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 제안하는 해결책
      description: 기능이 어떻게 동작하면 좋을지 설명해주세요.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 대안
      description: 생각해본 다른 방법이 있으면 적어주세요.

  - type: dropdown
    id: area
    attributes:
      label: 관련 영역
      options:
        - 홈 · 추천
        - POI 상세
        - 로그인 · 인증
        - 마이펫타임 · 펫
        - 알림 · 이메일
        - 리뷰 · 검증
        - 공통 · 디자인
        - 기타
    validations:
      required: true

  - type: textarea
    id: refs
    attributes:
      label: 참고 자료
      description: 관련 링크 · 문서 · PRD 섹션이 있으면 첨부해주세요.
